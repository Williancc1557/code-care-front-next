services:
  next-front:
    build:
      context: .
      dockerfile: Dockerfile
    image: next-front:prod
    container_name: next-front-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    networks:
      - caddy-network

networks:
  caddy-network:
    external: true
